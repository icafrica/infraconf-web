<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Favicon background -->
  <rect width="48" height="48" rx="8" fill="#0A2217"/>

  <!-- Lowercase "i" stem -->
  <line
    x1="14"
    y1="20"
    x2="14"
    y2="34"
    stroke="#FFFFFF"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Lowercase "i" dot (glowing LED) -->
  <circle
    cx="14"
    cy="12"
    r="2.5"
    fill="#7FFFC5"
  />

  <!-- Lowercase "c" curve -->
  <path
    d="M 34 20 Q 22 20 22 27 Q 22 34 34 34"
    stroke="#FFFFFF"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
