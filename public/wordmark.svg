<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!--
    InfraConf Africa — Full Wordmark
    Mark (48×48 centered in 64px tall) + Logotype
  -->

  <!-- ── MARK ── positioned left, vertically centred -->
  <g transform="translate(8, 8)">
    <!-- Lowercase "i" stem -->
    <line
      x1="14"
      y1="20"
      x2="14"
      y2="34"
      stroke="#0F2B1F"
      stroke-width="3.5"
      stroke-linecap="round"
    />

    <!-- Lowercase "i" dot -->
    <circle
      cx="14"
      cy="12"
      r="2.5"
      fill="#1D4C37"
    />

    <!-- Lowercase "c" curve -->
    <path
      d="M 34 20 Q 22 20 22 27 Q 22 34 34 34"
      stroke="#0F2B1F"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- ── LOGOTYPE ── -->
  <!-- Primary wordmark: "infraconf" -->
  <text
    x="68" y="34"
    font-family="'DM Serif Display', Georgia, serif"
    font-size="22"
    font-style="italic"
    fill="#1D4C37"
    letter-spacing="-0.5"
  >infraconf</text>

  <!-- Secondary wordmark: "africa" smaller, caps-spaced -->
  <text
    x="68" y="52"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="10"
    fill="#7FFFC5"
    letter-spacing="4"
    text-transform="uppercase"
  >AFRICA</text>

  <!-- Decorative rule between africa label and mark -->
  <line x1="68" y1="56" x2="268" y2="56" stroke="#C8E8D8" stroke-width="0.5"/>
</svg>
